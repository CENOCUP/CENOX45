<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA PRO - Sistema de Prestígio</title>
    <style>
        :root { --bg: #050505; --card: #111; --neon: #00ff87; --danger: #ff4444; --text: #fff; --dim: #888; --blue: #00d4ff; --gold: #ffd700; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1300px; }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--neon); padding-bottom: 10px; cursor: pointer; }

        /* PAINEL ADMIN */
        #adminPanel { display: none; background: #161616; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,135,0.1); }
        .btn { padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; font-size: 0.8rem; }
        .btn-blue { background: #0066ff; color: white; }
        .btn-orange { background: #ff9900; color: white; }
        .btn-green { background: var(--neon); color: #000; width: 100%; margin-top: 15px; height: 45px; }
        .btn-archive { background: #300; color: #f66; width: 100%; margin-top: 10px; padding: 8px; font-size: 0.7rem; }
        
        .row-edit { display: grid; grid-template-columns: 2fr repeat(6, 1fr) 40px; gap: 5px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; text-align: center; width: 100%; }

        /* TABELA */
        .table-wrap { background: var(--card); border-radius: 12px; padding: 15px; overflow-x: auto; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; min-width: 1150px; }
        th { text-align: center; color: var(--dim); font-size: 0.7rem; padding: 12px; border-bottom: 2px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #1a1a1a; text-align: center; }
        .text-left { text-align: left; }
        
        .col-pts { color: var(--neon); font-weight: 900; font-size: 1.1rem; background: rgba(0,255,135,0.05); }
        .col-forca { color: var(--gold); font-weight: 900; text-shadow: 0 0 8px rgba(255, 215, 0, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <header onclick="solicitarAcesso()">
        <h1>FIFA <span style="color:var(--neon)">PRESTÍGIO</span></h1>
        <p style="color:var(--dim); font-size: 0.7rem;">RANKING TRADICIONAL + BÓNUS DE POSIÇÃO NA FORÇA</p>
    </header>

    <div id="adminPanel">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
            <h3 style="margin:0; font-size:0.9rem; color:var(--neon)">🔓 CONTROLO DE ELITE</h3>
            <div>
                <button class="btn btn-blue" onclick="exportar()">📥 Backup</button>
                <button class="btn btn-orange" onclick="importar()">📤 Restaurar</button>
                <button class="btn" onclick="bloquearPainel()" style="background:#444; color:#fff;">Sair</button>
            </div>
        </div>
        <div id="editor"></div>
        <button onclick="addPlayer()" style="background:none; border:1px dashed #444; color:#666; width:100%; padding:8px; margin-top:10px; cursor:pointer;">+ ADICIONAR JOGADOR</button>
        <button class="btn btn-green" onclick="salvar()">💾 SALVAR PROGRESSO</button>
        <button class="btn btn-archive" onclick="encerrarTemporada()">🔒 ENCERRAR E DISTRIBUIR BÓNUS DE FORÇA</button>
    </div>

    <div class="table-wrap">
        <select id="viewSelect" onchange="mudarView(this.value)" style="background:#000; color:var(--neon); border:1px solid var(--neon); padding:8px; border-radius:5px; margin-bottom:15px; cursor:pointer;">
            <option value="atual">Temporada Atual</option>
            <option value="geral">Ranking Geral (Hall da Fama)</option>
        </select>
        <table>
            <thead>
                <tr>
                    <th>POS</th>
                    <th class="text-left">JOGADOR</th>
                    <th>PTS</th>
                    <th>J</th>
                    <th>V</th>
                    <th>E</th>
                    <th>D</th>
                    <th>GF</th>
                    <th>GS</th>
                    <th>SG</th>
                    <th>FORÇA (PRESTÍGIO)</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    const MINHA_SENHA = '123'; 
    let acessoAutorizado = false;

    const KEY = 'fifa_prestigio_v17';
    let db = JSON.parse(localStorage.getItem(KEY)) || { atual: [], historico: [] };
    let modo = 'atual';

    function solicitarAcesso() {
        const pass = prompt("Acesso de Organizador:");
        if(pass === MINHA_SENHA) {
            acessoAutorizado = true;
            document.getElementById('adminPanel').style.display = 'block';
            render();
        } else if(pass !== null) alert("Negado!");
    }

    function bloquearPainel() { acessoAutorizado = false; document.getElementById('adminPanel').style.display = 'none'; }
    function mudarView(v) { modo = v; render(); }

    function render() {
        const tbody = document.getElementById("tbody");
        const select = document.getElementById("viewSelect");
        
        while(select.options.length > 2) select.remove(2);
        db.historico.forEach((t, i) => {
            let opt = document.createElement('option');
            opt.value = i; opt.text = `Época: ${t.nome}`;
            if(modo == i) opt.selected = true;
            select.add(opt);
        });

        let lista = (modo === 'atual') ? [...db.atual] : (modo === 'geral' ? processarGeral() : [...db.historico[modo].dados]);

        // ORDENAÇÃO FIFA
        lista.sort((a,b) => {
            let pA = (a.v*3)+a.e, pB = (b.v*3)+b.e;
            let sgA = a.gp - a.gc, sgB = b.gp - b.gc;
            return pB - pA || b.v - a.v || sgB - sgA || b.gp - a.gp;
        });

        tbody.innerHTML = lista.map((j, i) => {
            let pts = (j.v*3)+j.e; 
            let sg = j.gp - j.gc;
            
            // Lógica da Força: No modo atual mostra cálculo de gols, no modo Geral mostra os bónus de posição acumulados
            let forcaExibida = modo === 'atual' ? ((j.gp * 1.5) - (j.gc * 1)).toFixed(1) : (j.forcaAcumulada || 0).toFixed(0);

            return `<tr>
                <td style="font-weight:bold; color:${i===0?'var(--neon)':(i===lista.length-1?'var(--danger)':'#555')}">${i+1}º</td>
                <td class="text-left"><b>${j.nome}</b></td>
                <td class="col-pts">${pts}</td>
                <td>${j.v+j.e+j.d}</td>
                <td>${j.v}</td>
                <td>${j.e}</td>
                <td>${j.d}</td>
                <td>${j.gp}</td>
                <td>${j.gc}</td>
                <td style="font-weight:bold; color:${sg>=0?'var(--blue)':'var(--danger)'}">${sg}</td>
                <td class="col-forca">${forcaExibida}</td>
            </tr>`;
        }).join('');

        if(acessoAutorizado) renderEditor();
    }

    function renderEditor() {
        document.getElementById('editor').innerHTML = db.atual.map((j,i) => `
            <div class="row-edit">
                <input type="text" value="${j.nome}" onchange="db.atual[${i}].nome=this.value">
                <input type="number" value="${j.v}" onchange="db.atual[${i}].v=parseInt(this.value)">
                <input type="number" value="${j.e}" onchange="db.atual[${i}].e=parseInt(this.value)">
                <input type="number" value="${j.d}" onchange="db.atual[${i}].d=parseInt(this.value)">
                <input type="number" value="${j.gp}" onchange="db.atual[${i}].gp=parseInt(this.value)">
                <input type="number" value="${j.gc}" onchange="db.atual[${i}].gc=parseInt(this.value)">
                <span></span>
            </div>
        `).join('');
    }

    function processarGeral() {
        let res = {};
        db.historico.forEach(temp => {
            temp.dados.forEach((j, index) => {
                // index aqui é a posição final na temporada (já ordenada)
                if(!res[j.nome]) res[j.nome] = {nome:j.nome, v:0, e:0, d:0, gp:0, gc:0, forcaAcumulada:0};
                res[j.nome].v += j.v; res[j.nome].e += j.e; res[j.nome].d += j.d;
                res[j.nome].gp += j.gp; res[j.nome].gc += j.gc;
                
                // Distribuição de Pontos de Força (Baseado na posição do histórico)
                if(index === 0) res[j.nome].forcaAcumulada += 15;
                else if(index === 1) res[j.nome].forcaAcumulada += 10;
                else if(index === 2) res[j.nome].forcaAcumulada += 6;
                else if(index === 3) res[j.nome].forcaAcumulada += 4;
                else if(index === 4) res[j.nome].forcaAcumulada += 2;
            });
        });
        // Adiciona a temporada atual (sem bónus ainda) para ver o acumulado real
        db.atual.forEach(j => {
            if(res[j.nome]) {
                res[j.nome].v += j.v; res[j.nome].e += j.e; res[j.nome].d += j.d;
                res[j.nome].gp += j.gp; res[j.nome].gc += j.gc;
            }
        });
        return Object.values(res);
    }

    function encerrarTemporada() {
        if(!acessoAutorizado || db.atual.length === 0) return;
        let nome = prompt("Nome desta Época (para o Hall da Fama):");
        if(nome) {
            // Ordena antes de salvar para garantir que o bónus vá para o lugar certo
            db.atual.sort((a,b) => {
                let pA = (a.v*3)+a.e, pB = (b.v*3)+b.e;
                let sgA = a.gp - a.gc, sgB = b.gp - b.gc;
                return pB - pA || b.v - a.v || sgB - sgA || b.gp - a.gp;
            });
            db.historico.push({ nome: nome, dados: JSON.parse(JSON.stringify(db.atual)) });
            db.atual = db.atual.map(j => ({ ...j, v:0, e:0, d:0, gp:0, gc:0 }));
            salvar();
            alert("Época Finalizada! Pontos de Força distribuídos no Ranking Geral.");
        }
    }

    function addPlayer() { 
        if(!acessoAutorizado) return;
        db.atual.push({nome:"Jogador", v:0, e:0, d:0, gp:0, gc:0}); 
        renderEditor(); 
    }

    function salvar() {
        if(!acessoAutorizado) return;
        localStorage.setItem(KEY, JSON.stringify(db));
        render();
    }

    function exportar() {
        const blob = new Blob([localStorage.getItem(KEY)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'backup_fifa_v17.json'; a.click();
    }

    function importar() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader(); reader.readAsText(e.target.files[0]);
            reader.onload = ev => { localStorage.setItem(KEY, ev.target.result); location.reload(); };
        };
        input.click();
    }

    render();
</script>
</body>
</html>
